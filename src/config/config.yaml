data:
  path: data/raw/telco_customer.csv

model:
  test_size: 0.2
  validation_size: 0.2
  random_state: 42

  # threshold tuning for class 1
  threshold_metric: precision
  threshold_beta: 1.0
  min_recall_for_threshold: 0.45

  random_forest:
    n_estimators: 300
    max_depth: 12
    min_samples_leaf: 2
    class_weight: null

output:
  model_path: artifacts/models/model.pkl
