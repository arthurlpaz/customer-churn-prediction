data:
  path: data/raw/telco_customer.csv

model:
  test_size: 0.2
  validation_size: 0.2
  random_state: 42

  # threshold tuning for class 1
  threshold_metric: precision
  threshold_beta: 1.0
  min_recall_for_threshold: 0.45

  random_forest:
    n_estimators: 300
    max_depth: 12
    min_samples_leaf: 2
    class_weight: null

  # optional search over RF hyperparameters on validation split
  random_forest_search:
    enabled: true
    n_estimators: [200, 300, 500]
    max_depth: [10, 12, 16]
    min_samples_leaf: [1, 2, 4]
    class_weight: [null, balanced]

output:
  model_path: artifacts/models/model.pkl
