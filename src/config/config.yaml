data:
  path: data/raw/telco_customer.csv

model:
  test_size: 0.2
  random_state: 42
  threshold: 0.30

  xgboost:
    n_estimators: 500
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: aucpr
    tree_method: hist

output:
  model_path: artifacts/models/model.pkl
