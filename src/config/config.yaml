data:
  path: data/raw/telco_customer.csv

model:
  # options: random_forest | xgboost
  name: xgboost
  test_size: 0.2
  random_state: 42
  decision_threshold: 0.5

  random_forest:
    n_estimators: 300
    max_depth: 12
    min_samples_leaf: 2
    class_weight: balanced

  xgboost:
    n_estimators: 400
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.8
    min_child_weight: 3
    reg_lambda: 1.0

output:
  model_path: artifacts/models/model.pkl
