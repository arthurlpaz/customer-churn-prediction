name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Black (format)
        run: black --check .

  smoke-train:
    name: Smoke training with synthetic data
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic dataset
        run: python scripts/generate_synthetic_data.py --output /tmp/telco_smoke.csv --rows 300

      - name: Run training pipeline (smoke)
        run: |
          python main.py \
            --config-path src/config/config.ci.yaml \
            --data-path /tmp/telco_smoke.csv

      - name: Upload smoke model artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-model
          path: artifacts/models/model_ci.pkl
          if-no-files-found: error
